<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2874f0">
  <title>Cart - Flipkart</title>
  <link rel="stylesheet" href="css/flipkart.css">
</head>
<body>
  <header class="fk-header">
    <a href="javascript:history.back()" class="fk-back" aria-label="Back">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </a>
    <span style="font-weight:600;font-size:16px">Cart</span>
    <span style="width:24px"></span>
  </header>

  <div class="fk-stepper">
    <div class="step active"><span class="num">1</span> Cart</div>
    <div class="step"><span class="num">2</span> Address</div>
    <div class="step"><span class="num">3</span> Payment</div>
  </div>

  <div id="cartList"></div>

  <div class="fk-cart-footer">
    <div class="total">Order Total: <span id="orderTotal">₹0</span></div>
    <a href="checkout.html" class="btn-place-order" id="btnPlaceOrder" style="display:block;text-align:center;color:inherit;text-decoration:none">PLACE ORDER</a>
  </div>

  <script src="js/app.js"></script>
  <script>
    function renderCart() {
      const products = JSON.parse(localStorage.getItem('products') || '[]');
      const el = document.getElementById('cartList');
      let total = 0;

      if (!products.length) {
        el.innerHTML = '<div class="fk-empty-cart"><div class="heading">Your cart is empty</div><p>Add items from home to continue</p><a href="home.html" class="btn-primary-fk" style="display:inline-block;margin-top:12px">Shop Now</a></div>';
        document.getElementById('orderTotal').textContent = '₹0';
        document.getElementById('btnPlaceOrder').style.pointerEvents = 'none';
        document.getElementById('btnPlaceOrder').style.opacity = '0.6';
        return;
      }

      el.innerHTML = products.map(p => {
        const sub = p.price * (p.qty || 1);
        total += sub;
        const variantText = (p.variantLabel && p.variantValue)
          ? `${p.variantLabel}: ${p.variantValue}`
          : ((p.size && p.size !== 'N/A' && p.size !== 'One Size') ? `Size: ${p.size}` : '');
        return `
          <div class="fk-cart-item" data-index="${p.index}">
            <div class="thumb"><img src="${p.product_img}" alt=""></div>
            <div class="meta" style="flex:1">
              <div class="name">${p.product_title}</div>
              <div class="price">₹${p.price} × ${p.qty || 1} = ₹${sub.toFixed(0)}</div>
              ${variantText ? `<p style="font-size:12px;color:#878787;margin-top:4px">${variantText}</p>` : ''}
              <button type="button" class="cart-remove-btn" onclick="removeItem(${p.index})" title="Remove from cart">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                Remove
              </button>
            </div>
          </div>`;
      }).join('');

      document.getElementById('orderTotal').textContent = '₹' + total.toFixed(2);
      localStorage.setItem('cartTotalAmount', total.toFixed(2));
    }

    function removeItem(index) {
      let products = JSON.parse(localStorage.getItem('products') || '[]');
      products.splice(index, 1);
      products.forEach((p, i) => p.index = i);
      localStorage.setItem('products', JSON.stringify(products));
      renderCart();
    }

    document.getElementById('btnPlaceOrder').addEventListener('click', function(e) {
      const products = JSON.parse(localStorage.getItem('products') || '[]');
      if (!products.length) {
        e.preventDefault();
        return;
      }
      // If checkout.html doesn't exist, go to home for now
      if (!document.querySelector('a[href="checkout.html"]')) {}
    });

    renderCart();
  </script>
</body>
</html>
