<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2874f0">
  <title>Product - Flipkart</title>
  <link rel="stylesheet" href="css/flipkart.css">
  <style>
    .main-img-wrap { position: relative; text-align: center; }
    .gallery-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
    }
    .gallery-nav.prev { left: 8px; }
    .gallery-nav.next { right: 8px; }
    .gallery-dots { display: flex; justify-content: center; gap: 6px; margin-top: 10px; }
    .gallery-dots button {
      width: 8px;
      height: 8px;
      border: none;
      border-radius: 50%;
      background: #c7c7c7;
      cursor: pointer;
      padding: 0;
    }
    .gallery-dots button.on { background: #2874f0; }
  </style>
</head>
<body>
  <div class="fk-overlay" id="overlay"></div>

  <header class="fk-header">
    <a href="javascript:history.back()" class="fk-back" aria-label="Back">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </a>
    <a href="home.html" class="fk-logo">
      <span class="yellow">Flipkart</span><span class="plus">✕</span>
    </a>
    <a href="#" onclick="openCart(); return false;" style="position:relative; color:#fff">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="fk-cart-count" id="cartCount">0</span>
    </a>
  </header>

  <div class="fk-product-page">
    <div class="main-img-wrap">
      <button type="button" class="gallery-nav prev" onclick="prevImage()">&#8249;</button>
      <img id="productImage" src="" alt="">
      <button type="button" class="gallery-nav next" onclick="nextImage()">&#8250;</button>
      <div id="galleryDots" class="gallery-dots"></div>
    </div>
    <div class="info">
      <h1 class="p-title" id="productTitle"></h1>
      <div class="p-price-row">
        <span class="p-price" id="productPrice">₹0</span>
        <span class="p-mrp" id="productMrp">₹0</span>
        <span class="p-off" id="productDiscount">0% off</span>
      </div>
      <p style="font-size:12px;color:#388e3c;margin-top:6px">Free delivery</p>
      <p style="margin-top:12px;font-size:13px;color:#878787" id="productDetails">Product details</p>
      <div style="margin-top:16px;">
        <strong style="font-size:13px">Select Size</strong>
        <div id="sizeList" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px"></div>
      </div>
    </div>

    <div class="fixed-actions">
      <button type="button" class="btn-add-cart" onclick="addToCart(false)">ADD TO CART</button>
      <button type="button" class="btn-buy" onclick="addToCart(true)">BUY NOW</button>
    </div>
  </div>

  <div class="fk-sidenav" id="sidenav">
    <div class="drawer-head"><span>Your Cart</span><span class="close" onclick="closeCart()">×</span></div>
    <div class="drawer-body" id="cartDrawerList"></div>
    <div class="drawer-foot">
      <div class="total-row"><span>Total</span><span id="drawerTotal">₹0</span></div>
      <a href="cart.html" class="btn-view-cart">View Cart</a>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    if (!id) { location.href = 'home.html'; }

    let currentProduct = APP.getProductById(id);
    if (!currentProduct) { location.href = 'home.html'; }

    let selectedSize = (currentProduct.sizes && currentProduct.sizes[0]) || 'M';
    let galleryImages = [];
    let currentImageIndex = 0;
    let galleryTimer = null;

    function buildGalleryList(p) {
      const raw = [p && p.image, ...((p && Array.isArray(p.gallery)) ? p.gallery : [])]
        .map(v => String(v || '').trim())
        .filter(Boolean);
      return [...new Set(raw)];
    }

    function renderGallery() {
      if (!galleryImages.length) {
        galleryImages = ['https://placehold.co/400x400/f1f3f6/2874f0?text=No+Image'];
      }
      if (currentImageIndex >= galleryImages.length) currentImageIndex = 0;
      const imgEl = document.getElementById('productImage');
      imgEl.src = galleryImages[currentImageIndex];
      imgEl.onerror = function () {
        imgEl.src = 'https://placehold.co/400x400/f1f3f6/2874f0?text=No+Image';
      };
      const dots = document.getElementById('galleryDots');
      dots.innerHTML = galleryImages.map((_, i) =>
        `<button type="button" class="${i===currentImageIndex?'on':''}" onclick="goToImage(${i})"></button>`
      ).join('');
      const showNav = galleryImages.length > 1;
      document.querySelector('.gallery-nav.prev').style.display = showNav ? 'block' : 'none';
      document.querySelector('.gallery-nav.next').style.display = showNav ? 'block' : 'none';
    }

    function goToImage(i) {
      currentImageIndex = i;
      renderGallery();
      resetGalleryTimer();
    }

    function nextImage() {
      if (galleryImages.length < 2) return;
      currentImageIndex = (currentImageIndex + 1) % galleryImages.length;
      renderGallery();
      resetGalleryTimer();
    }

    function prevImage() {
      if (galleryImages.length < 2) return;
      currentImageIndex = (currentImageIndex - 1 + galleryImages.length) % galleryImages.length;
      renderGallery();
      resetGalleryTimer();
    }

    function resetGalleryTimer() {
      if (galleryTimer) clearInterval(galleryTimer);
      if (galleryImages.length > 1) {
        galleryTimer = setInterval(() => {
          currentImageIndex = (currentImageIndex + 1) % galleryImages.length;
          renderGallery();
        }, 2500);
      }
    }

    galleryImages = buildGalleryList(currentProduct);
    renderGallery();
    resetGalleryTimer();
    document.getElementById('productTitle').textContent = currentProduct.name;
    document.getElementById('productPrice').textContent = '₹' + currentProduct.price;
    document.getElementById('productMrp').textContent = '₹' + currentProduct.mrp;
    document.getElementById('productDiscount').textContent = APP.getOffPercent(currentProduct.price, currentProduct.mrp) + '% off';
    document.getElementById('productDetails').textContent = "Men's business casual polo in polyester. Short sleeve, machine washable.";

    const sizes = currentProduct.sizes || ['XS', 'S', 'M', 'L', 'XL'];
    document.getElementById('sizeList').innerHTML = sizes.map(s =>
      `<span class="dress-size" data-size="${s}" onclick="selectSize('${s}')" style="padding:8px 14px;border:1px solid #e0e0e0;border-radius:4px;cursor:pointer;font-size:13px">${s}</span>`
    ).join('');

    function selectSize(s) {
      selectedSize = s;
      document.querySelectorAll('.dress-size').forEach(el => {
        el.style.borderColor = el.dataset.size === s ? '#2874f0' : '#e0e0e0';
        el.style.background = el.dataset.size === s ? '#e8f0fe' : '#fff';
      });
    }
    selectSize(selectedSize);

    function openCart() {
      document.getElementById('sidenav').classList.add('open');
      document.getElementById('overlay').style.display = 'block';
    }
    function closeCart() {
      document.getElementById('sidenav').classList.remove('open');
      document.getElementById('overlay').style.display = 'none';
    }
    document.getElementById('overlay').onclick = closeCart;

    function addToCart(buyNow) {
      let products = JSON.parse(localStorage.getItem('products') || '[]');
      const item = {
        index: products.length,
        product_id: currentProduct.id,
        product_title: currentProduct.name,
        product_img: currentProduct.image,
        price: currentProduct.price,
        mrp: currentProduct.mrp,
        size: selectedSize,
        qty: 1
      };
      const exists = products.find(p => p.product_id === currentProduct.id && p.size === selectedSize);
      if (!exists) products.push(item);
      else exists.qty += 1;
      products.forEach((p, i) => p.index = i);
      localStorage.setItem('products', JSON.stringify(products));
      const total = products.reduce((s, p) => s + p.price * p.qty, 0);
      localStorage.setItem('cartTotalAmount', total.toFixed(2));

      if (buyNow) location.href = 'checkout.html';
      else {
        updateCartUI();
        openCart();
      }
    }

    function updateCartUI() {
      const products = JSON.parse(localStorage.getItem('products') || '[]');
      document.getElementById('cartCount').textContent = products.length;
      let total = 0;
      const html = products.length ? products.map(p => {
        total += p.price * (p.qty || 1);
        return `<div class="fk-cart-item"><div class="thumb"><img src="${p.product_img}" alt=""></div><div class="meta"><div class="name">${p.product_title}</div><div class="price">₹${p.price} × ${p.qty || 1}</div></div></div>`;
      }).join('') : '<div class="fk-empty-cart"><div class="heading">Cart is empty</div></div>';
      document.getElementById('cartDrawerList').innerHTML = html;
      document.getElementById('drawerTotal').textContent = '₹' + total.toFixed(2);
    }
    updateCartUI();
  </script>
</body>
</html>
