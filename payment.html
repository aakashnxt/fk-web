<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2874f0">
  <title>Payment</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <link rel="stylesheet" href="css/flipkart.css">
  <style>
    .pay-wrap { padding: 16px; max-width: 500px; margin: 0 auto; }
    .pay-total { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #212121; }
    .pay-option { display: flex; align-items: center; gap: 12px; padding: 14px; border: 2px solid #e0e0e0; border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: all .2s; }
    .pay-option.selected { border-color: #2874f0; background: #e8f0fe; }
    .pay-option input[type=radio] { accent-color: #2874f0; width: 18px; height: 18px; }
    .pay-label { font-weight: 600; font-size: 14px; }
    .pay-sub { font-size: 12px; color: #666; }
    .qr-box { background:#fff; border:1px solid #e0e0e0; border-radius:8px; padding:16px; text-align:center; margin-top:10px; display:none; }
    .qr-box.show { display:block; }
    .qr-box img { width:180px; height:180px; border-radius:4px; }
    .qr-amount { font-size:22px; font-weight:700; color:#2874f0; margin-top:8px; }
    .qr-upi { font-size:13px; color:#333; margin-top:6px; word-break:break-all; }
    .qr-note { font-size:12px; color:#666; margin-top:4px; }
    .btn-pay { width: 100%; padding: 14px; background: #ffe500; color: #212121; border: none; font-weight: 700; font-size: 15px; border-radius: 4px; cursor: pointer; margin-top: 18px; }
    .step-info { font-size:12px; color:#388e3c; background:#f1faf3; border:1px solid #c8e6c9; border-radius:6px; padding:10px 12px; margin-top:10px; }
  </style>
</head>
<body>
  <header class="fk-header">
    <a href="checkout.html" class="fk-back">←</a>
    <span style="font-weight:600">Payment</span>
    <span style="width:24px"></span>
  </header>

  <div class="fk-stepper">
    <div class="step"><span class="num">1</span> Cart</div>
    <div class="step"><span class="num">2</span> Address</div>
    <div class="step active"><span class="num">3</span> Payment</div>
  </div>

  <div class="pay-wrap">
    <div class="pay-total">Amount to pay: <span id="payAmount">₹0</span></div>

    <div class="qr-box show" id="qrBox">
      <p style="font-size:13px;font-weight:600;margin-bottom:8px">Scan QR to Pay</p>
      <img id="qrImg" src="" alt="QR">
      <div class="qr-amount" id="qrAmount"></div>
      <div class="qr-upi" id="qrUpi"></div>
      <div class="qr-note">Open any UPI app and scan</div>
      <div class="step-info">✅ After payment, click <strong>PLACE ORDER</strong> below</div>
    </div>

    <button type="button" class="btn-pay" onclick="confirmPay()">PLACE ORDER</button>
  </div>

  <script src="js/app.js"></script>
  <script>
    const total = parseFloat(localStorage.getItem('cartTotalAmount') || '0');
    document.getElementById('payAmount').textContent = '₹' + total.toFixed(2);
    let selectedMethod = 'upi';

    function selectPay(method) {
      selectedMethod = method;
      const cod = document.getElementById('opt-cod');
      const upi = document.getElementById('opt-upi');
      if (cod) cod.classList.toggle('selected', method === 'cod');
      if (upi) upi.classList.toggle('selected', method === 'upi');
      document.getElementById('qrBox').classList.toggle('show', method === 'upi');
      if (method === 'upi') buildQR();
    }

    async function buildQR() {
      await APP.initFirebase();
      const upi = await APP.getUpiAsync();
      const upiId = upi.upiId || '';
      const name = encodeURIComponent(upi.name || 'Store');
      const note = encodeURIComponent(upi.note || 'Order Payment');
      const amt = total.toFixed(2);

      if (!upiId) {
        document.getElementById('qrImg').alt = 'UPI not set';
        document.getElementById('qrUpi').textContent = 'Ask admin to set UPI in admin panel';
        document.getElementById('qrAmount').textContent = '';
        return;
      }

      const upiStr = `upi://pay?pa=${encodeURIComponent(upiId)}&pn=${name}&am=${amt}&tn=${note}&cu=INR`;
      const qrImg = document.getElementById('qrImg');
      const primaryQR = 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=' + encodeURIComponent(upiStr);
      const fallbackQR = 'https://quickchart.io/qr?size=180&text=' + encodeURIComponent(upiStr);
      qrImg.dataset.fallback = '0';
      qrImg.onerror = function () {
        if (qrImg.dataset.fallback === '0') {
          qrImg.dataset.fallback = '1';
          qrImg.src = fallbackQR;
        } else {
          qrImg.alt = 'QR unavailable';
          document.getElementById('qrUpi').textContent = 'UPI: ' + upiId + ' (QR unavailable, use UPI ID manually)';
        }
      };
      qrImg.src = primaryQR;
      document.getElementById('qrAmount').textContent = '₹' + amt;
      document.getElementById('qrUpi').textContent = 'UPI: ' + upiId;
    }

    function confirmPay() {
      localStorage.removeItem('products');
      localStorage.setItem('cartTotalAmount', '0');
      alert('🎉 Order placed successfully!');
      window.location.href = 'home.html';
    }

    buildQR();
  </script>
</body>
</html>
